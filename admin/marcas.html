<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Marcas - Admin</title>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-NT81HK0ZXQ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-NT81HK0ZXQ');
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { marca: { preto: "#0a0a0a", branco: "#ffffff", cinza: "#1a1a1a", claro: "#f5f5f5" } } } } };
  </script>
  <style type="text/tailwindcss">
    @layer components {
      .btn-primary { @apply bg-marca-preto text-marca-branco px-4 py-2 rounded-lg font-medium hover:bg-marca-cinza transition disabled:opacity-50; }
      .btn-outline { @apply border border-marca-preto text-marca-preto px-4 py-2 rounded-lg font-medium hover:bg-marca-preto hover:text-marca-branco transition; }
      .input { @apply w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-marca-preto; }
      .card { @apply bg-marca-branco border border-gray-200 rounded-xl shadow-sm; }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-marca-claro min-h-screen">
  <div id="nav"></div>
  <main class="max-w-4xl mx-auto px-4 py-6">
    <div class="flex justify-between items-center mb-4 flex-wrap gap-2">
      <h2 class="text-2xl font-bold">Marcas</h2>
      <button class="btn-primary" onclick="abrirModal()">+ Nova marca</button>
    </div>
    <div class="overflow-x-auto card">
      <table class="w-full text-sm">
        <thead class="bg-marca-preto text-marca-branco">
          <tr>
            <th class="p-2 text-left">Nome</th>
            <th class="p-2 text-center">Ativo</th>
            <th class="p-2"></th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </main>

  <div id="modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center px-4 z-50">
    <form id="form" class="card p-4 w-full max-w-sm space-y-3">
      <h3 id="titulo-modal" class="font-bold text-lg">Nova marca</h3>
      <input type="hidden" name="id" />
      <input class="input" name="nome" placeholder="Nome da marca" required />
      <label class="flex items-center gap-2 text-sm">
        <input type="checkbox" name="ativo" checked /> Ativo
      </label>
      <div class="flex gap-2 justify-end">
        <button type="button" class="btn-outline" onclick="fecharModal()">Cancelar</button>
        <button id="btn-salvar" class="btn-primary" type="submit">Salvar</button>
      </div>
    </form>
  </div>

  <script src="/js/config.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    Auth.requireLogin().then(u => { if (u) carregar(); });
    fetch("/admin/_nav.html").then(r => r.text()).then(h => document.getElementById("nav").innerHTML = h);

    async function carregar() {
      const { data, error } = await sb.from("marcas").select("*").order("nome");
      if (error) { alert(error.message); return; }
      document.getElementById("tbody").innerHTML = data.map(m => `
        <tr class="border-t">
          <td class="p-2">${esc(m.nome)}</td>
          <td class="p-2 text-center">${m.ativo ? "✓" : "✗"}</td>
          <td class="p-2 text-right whitespace-nowrap">
            <button class="text-blue-600 underline" onclick='editar(${escAttr(m)})'>editar</button>
            <button class="text-red-600 underline ml-2" onclick='excluir(${escAttr({ id: m.id, nome: m.nome })})'>excluir</button>
          </td>
        </tr>
      `).join("");
    }

    function abrirModal() {
      document.getElementById("form").reset();
      document.querySelector('[name=id]').value = "";
      document.getElementById("titulo-modal").textContent = "Nova marca";
      document.getElementById("modal").classList.remove("hidden");
    }
    function fecharModal() { document.getElementById("modal").classList.add("hidden"); }
    function editar(m) {
      document.getElementById("titulo-modal").textContent = "Editar marca";
      document.querySelector('[name=id]').value = m.id;
      document.querySelector('[name=nome]').value = m.nome;
      document.querySelector('[name=ativo]').checked = !!m.ativo;
      document.getElementById("modal").classList.remove("hidden");
    }

    async function excluir(m) {
      if (!confirm(`Excluir "${esc(m.nome)}"?`)) return;
      const { error } = await sb.from("marcas").delete().eq("id", m.id);
      if (error) { alert(error.message); return; }
      carregar();
    }

    document.getElementById("form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const f = new FormData(e.target);
      const btn = document.getElementById("btn-salvar");
      btn.disabled = true; btn.textContent = "Salvando...";

      try {
        const payload = {
          nome: f.get("nome"),
          ativo: f.get("ativo") === "on",
        };
        const id = f.get("id");
        const { error } = id
          ? await sb.from("marcas").update(payload).eq("id", id)
          : await sb.from("marcas").insert(payload);
        if (error) throw error;
        fecharModal();
        carregar();
      } catch (err) {
        alert(err.message || err);
      } finally {
        btn.disabled = false; btn.textContent = "Salvar";
      }
    });
  </script>
  <script src="/js/footer.js"></script>
</body>
</html>
