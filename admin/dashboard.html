<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Produtos - Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { marca: { preto: "#0a0a0a", branco: "#ffffff", cinza: "#1a1a1a", claro: "#f5f5f5" } } } } };
  </script>
  <style type="text/tailwindcss">
    @layer components {
      .btn-primary { @apply bg-marca-preto text-marca-branco px-4 py-2 rounded-lg font-medium hover:bg-marca-cinza transition disabled:opacity-50; }
      .btn-outline { @apply border border-marca-preto text-marca-preto px-4 py-2 rounded-lg font-medium hover:bg-marca-preto hover:text-marca-branco transition; }
      .input { @apply w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-marca-preto; }
      .card { @apply bg-marca-branco border border-gray-200 rounded-xl shadow-sm; }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-marca-claro min-h-screen">
  <div id="nav"></div>
  <main class="max-w-6xl mx-auto px-4 py-6">
    <div class="flex justify-between items-center mb-4 flex-wrap gap-2">
      <h2 class="text-2xl font-bold">Produtos & Estoque</h2>
      <button class="btn-primary" onclick="abrirModal()">+ Novo produto</button>
    </div>
    <div class="overflow-x-auto card">
      <table class="w-full text-sm">
        <thead class="bg-marca-preto text-marca-branco">
          <tr>
            <th class="p-2 text-left">Foto</th>
            <th class="p-2 text-left">Nome</th>
            <th class="p-2 text-right">Preco</th>
            <th class="p-2 text-right">Estoque</th>
            <th class="p-2 text-center">Ativo</th>
            <th class="p-2"></th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </main>

  <div id="modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center px-4 z-50 overflow-y-auto">
    <form id="form" class="card p-4 w-full max-w-md space-y-3 my-8">
      <h3 id="titulo-modal" class="font-bold text-lg">Novo produto</h3>
      <input type="hidden" name="id" />
      <input class="input" name="nome" placeholder="Nome" required />
      <textarea class="input" name="descricao" placeholder="Descricao" rows="2"></textarea>
      <div class="grid grid-cols-2 gap-2">
        <input class="input" name="preco" type="number" step="0.01" placeholder="Preco" required />
        <input class="input" name="estoque" type="number" placeholder="Estoque" required />
      </div>
      <select class="input" name="marca_id" id="sel-marca">
        <option value="">Sem marca</option>
      </select>
      <input class="input" name="imagem" type="file" accept="image/*" onchange="preview(event)" />
      <input type="hidden" name="imagem_url" />
      <div id="preview-wrap" class="hidden">
        <p class="text-xs text-gray-500 mb-1">Pre-visualizacao:</p>
        <img id="preview-img" class="w-32 h-32 object-cover rounded border" />
      </div>
      <label class="flex items-center gap-2 text-sm">
        <input type="checkbox" name="ativo" checked /> Ativo
      </label>
      <div class="flex gap-2 justify-end">
        <button type="button" class="btn-outline" onclick="fecharModal()">Cancelar</button>
        <button id="btn-salvar" class="btn-primary" type="submit">Salvar</button>
      </div>
    </form>
  </div>

  <script src="/js/config.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    let marcas = [];

    Auth.requireLogin().then(u => { if (u) init(); });
    fetch("/admin/_nav.html").then(r => r.text()).then(h => document.getElementById("nav").innerHTML = h);

    async function init() {
      await carregarMarcas();
      await carregar();
    }

    async function carregarMarcas() {
      const { data, error } = await sb.from("marcas").select("*").eq("ativo", true).order("nome");
      if (error) {
        // tabela ainda nao existe no banco — silencioso, so nao mostra marcas
        console.warn("marcas:", error.message);
        return;
      }
      marcas = data || [];
      const sel = document.getElementById("sel-marca");
      sel.innerHTML = `<option value="">Sem marca</option>` +
        marcas.map(m => `<option value="${esc(m.id)}">${esc(m.nome)}</option>`).join("");
    }

    async function carregar() {
      const { data, error } = await sb.from("produtos").select("*").order("nome");
      if (error) { alert("Erro ao carregar produtos: " + error.message); return; }
      if (!data.length) {
        document.getElementById("tbody").innerHTML =
          '<tr><td colspan="6" class="p-4 text-center text-gray-500">Nenhum produto cadastrado.</td></tr>';
        return;
      }
      document.getElementById("tbody").innerHTML = data.map(p => {
        const nomeMarca = marcas.find(m => m.id === p.marca_id)?.nome || "-";
        return `
        <tr class="border-t hover:bg-gray-50">
          <td class="p-2">
            <div class="w-12 h-12 bg-gray-100 rounded overflow-hidden flex items-center justify-center">
              ${p.imagem_url
                ? `<img src="${esc(p.imagem_url)}" loading="lazy" decoding="async" class="w-full h-full object-cover">`
                : `<span class="text-gray-300 text-xs">sem foto</span>`}
            </div>
          </td>
          <td class="p-2">
            <p class="font-medium">${esc(p.nome)}</p>
            <p class="text-xs text-gray-500">${esc(nomeMarca)}</p>
          </td>
          <td class="p-2 text-right">${fmtBRL(p.preco)}</td>
          <td class="p-2 text-right">${Number(p.estoque)}</td>
          <td class="p-2 text-center">${p.ativo ? "&#10003;" : "&#10007;"}</td>
          <td class="p-2 text-right whitespace-nowrap">
            <button class="text-blue-600 underline" onclick='editar(${escAttr(p)})'>editar</button>
            <button class="text-red-600 underline ml-2" onclick='excluir(${escAttr({ id: p.id, nome: p.nome, imagem_url: p.imagem_url })})'>excluir</button>
          </td>
        </tr>`;
      }).join("");
    }

    function abrirModal() {
      document.getElementById("form").reset();
      document.querySelector('[name=id]').value = "";
      document.getElementById("titulo-modal").textContent = "Novo produto";
      document.getElementById("preview-wrap").classList.add("hidden");
      document.getElementById("modal").classList.remove("hidden");
    }

    function fecharModal() {
      document.getElementById("modal").classList.add("hidden");
    }

    function editar(p) {
      document.getElementById("titulo-modal").textContent = "Editar produto";
      document.querySelector('[name=id]').value        = p.id;
      document.querySelector('[name=nome]').value      = p.nome;
      document.querySelector('[name=descricao]').value = p.descricao || "";
      document.querySelector('[name=preco]').value     = p.preco;
      document.querySelector('[name=estoque]').value   = p.estoque;
      document.getElementById("sel-marca").value       = p.marca_id || "";
      document.querySelector('[name=imagem_url]').value = p.imagem_url || "";
      document.querySelector('[name=ativo]').checked   = !!p.ativo;
      const img = document.getElementById("preview-img");
      const wrap = document.getElementById("preview-wrap");
      if (p.imagem_url) { img.src = p.imagem_url; wrap.classList.remove("hidden"); }
      else { wrap.classList.add("hidden"); }
      document.getElementById("modal").classList.remove("hidden");
    }

    function preview(ev) {
      const file = ev.target.files[0];
      if (!file) return;
      if (file.size > 5 * 1024 * 1024) {
        alert(`Imagem muito grande (${(file.size / 1024 / 1024).toFixed(1)}MB). Maximo: 5MB.`);
        ev.target.value = "";
        return;
      }
      document.getElementById("preview-img").src = URL.createObjectURL(file);
      document.getElementById("preview-wrap").classList.remove("hidden");
    }

    async function excluir(p) {
      const filtro = [{ produto_id: p.id }];
      const [pedRes, pdvRes] = await Promise.all([
        sb.from("pedidos").select("id", { count: "exact", head: true }).contains("itens", filtro),
        sb.from("vendas_pdv").select("id", { count: "exact", head: true }).contains("itens", filtro),
      ]);
      const total = (pedRes.count || 0) + (pdvRes.count || 0);
      if (total > 0) {
        if (!confirm(`"${p.nome}" tem ${total} venda(s). Nao posso excluir, mas posso INATIVAR. Continuar?`)) return;
        const { error } = await sb.from("produtos").update({ ativo: false }).eq("id", p.id);
        if (error) { alert(error.message); return; }
      } else {
        if (!confirm(`Excluir "${p.nome}" definitivamente?`)) return;
        const { error } = await sb.from("produtos").delete().eq("id", p.id);
        if (error) { alert(error.message); return; }
        if (p.imagem_url) {
          const path = p.imagem_url.split("/produtos/").pop();
          if (path) await sb.storage.from("produtos").remove([path]);
        }
      }
      carregar();
    }

    document.getElementById("form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("btn-salvar");
      btn.disabled = true;
      btn.textContent = "Salvando...";
      try {
        const f = new FormData(e.target);
        let imagem_url = f.get("imagem_url") || null;
        const file = f.get("imagem");
        if (file && file.size > 0) {
          const ext = file.name.split(".").pop();
          const path = `${crypto.randomUUID()}.${ext}`;
          btn.textContent = "Enviando imagem...";
          const { error: upErr } = await sb.storage.from("produtos").upload(path, file, { contentType: file.type });
          if (upErr) throw upErr;
          imagem_url = sb.storage.from("produtos").getPublicUrl(path).data.publicUrl;
        }
        const payload = {
          nome:      f.get("nome"),
          descricao: f.get("descricao") || null,
          preco:     Number(f.get("preco")),
          estoque:   Number(f.get("estoque")),
          marca_id:  f.get("marca_id") || null,
          ativo:     f.get("ativo") === "on",
          imagem_url,
        };
        const id = f.get("id");
        const { error } = id
          ? await sb.from("produtos").update(payload).eq("id", id)
          : await sb.from("produtos").insert(payload);
        if (error) throw error;
        fecharModal();
        carregar();
      } catch (err) {
        alert(err.message || err);
      } finally {
        btn.disabled = false;
        btn.textContent = "Salvar";
      }
    });
  </script>
  <script src="/js/footer.js"></script>
</body>
</html>
