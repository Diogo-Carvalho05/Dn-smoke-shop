<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PDV - Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { marca: { preto: "#0a0a0a", branco: "#ffffff", cinza: "#1a1a1a", claro: "#f5f5f5" } } } } };
  </script>
  <style type="text/tailwindcss">
    @layer components {
      .btn-primary { @apply bg-marca-preto text-marca-branco px-4 py-2 rounded-lg font-medium hover:bg-marca-cinza transition disabled:opacity-50; }
      .btn-outline { @apply border border-marca-preto text-marca-preto px-4 py-2 rounded-lg font-medium hover:bg-marca-preto hover:text-marca-branco transition; }
      .input { @apply w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-marca-preto; }
      .card { @apply bg-marca-branco border border-gray-200 rounded-xl shadow-sm; }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-marca-claro min-h-screen">
  <div id="nav"></div>
  <main class="max-w-6xl mx-auto px-4 py-6 grid md:grid-cols-2 gap-4">
    <div>
      <h2 class="text-xl font-bold mb-3">Produtos</h2>
      <input class="input mb-3" id="busca" placeholder="Buscar produto..." />
      <div id="produtos" class="grid grid-cols-2 gap-2"></div>
    </div>
    <div>
      <h2 class="text-xl font-bold mb-3">Venda atual</h2>
      <div id="venda" class="card p-3 space-y-2 mb-3"></div>
      <div class="card p-3">
        <div class="flex justify-between font-bold text-lg mb-2">
          <span>Total</span><span id="total">R$ 0,00</span>
        </div>
        <select id="pg" class="input mb-2">
          <option value="dinheiro">Dinheiro</option>
          <option value="pix">PIX</option>
          <option value="cartao">Cartao</option>
        </select>
        <button class="btn-primary w-full" onclick="finalizar()">Finalizar venda</button>
      </div>
    </div>
  </main>

  <script src="/js/config.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    let produtos = [];
    let venda = [];
    let user;

    Auth.requireLogin().then(async u => { if (!u) return; user = u; await carregar(); });
    fetch("/admin/_nav.html").then(r => r.text()).then(h => document.getElementById("nav").innerHTML = h);

    async function carregar() {
      const { data, error } = await sb.from("produtos").select("*").eq("ativo", true).order("nome");
      if (error) { alert(error.message); return; }
      produtos = data;
      render();
    }
    function render() {
      const filtro = document.getElementById("busca").value.toLowerCase();
      const lista = produtos.filter(p => p.nome.toLowerCase().includes(filtro));
      document.getElementById("produtos").innerHTML = lista.map(p => `
        <button class="card p-2 text-left hover:bg-gray-100 ${p.estoque <= 0 ? "opacity-50" : ""}"
                onclick='add(${escAttr(p)})' ${p.estoque <= 0 ? "disabled" : ""}>
          <p class="font-semibold text-sm">${esc(p.nome)}</p>
          <p class="text-xs">${fmtBRL(p.preco)} - est: ${Number(p.estoque)}</p>
        </button>
      `).join("");
      document.getElementById("venda").innerHTML = venda.length ? venda.map((i, idx) => `
        <div class="flex items-center gap-2 text-sm">
          <span class="flex-1">${esc(i.nome)}</span>
          <button class="btn-outline px-2 py-0" onclick="qtd(${idx}, -1)">-</button>
          <span class="w-6 text-center">${Number(i.quantidade)}</span>
          <button class="btn-outline px-2 py-0" onclick="qtd(${idx}, 1)">+</button>
          <span class="w-20 text-right font-bold">${fmtBRL(i.preco * i.quantidade)}</span>
        </div>
      `).join("") : '<p class="text-gray-500 text-sm">Nenhum item.</p>';
      document.getElementById("total").textContent = fmtBRL(venda.reduce((s, i) => s + i.preco * i.quantidade, 0));
    }
    function estoqueAtual(produto_id) {
      const p = produtos.find(x => x.id === produto_id);
      return p ? Number(p.estoque) : 0;
    }
    function add(p) {
      const max = Number(p.estoque);
      const i = venda.findIndex(x => x.produto_id === p.id);
      const atual = i >= 0 ? venda[i].quantidade : 0;
      if (atual + 1 > max) { alert(`Estoque insuficiente para "${p.nome}". Maximo: ${max}.`); return; }
      if (i >= 0) venda[i].quantidade++;
      else venda.push({ produto_id: p.id, nome: p.nome, preco: Number(p.preco), quantidade: 1 });
      render();
    }
    function qtd(idx, d) {
      const item = venda[idx];
      const nova = item.quantidade + d;
      if (d > 0) {
        const max = estoqueAtual(item.produto_id);
        if (nova > max) { alert(`Estoque insuficiente para "${item.nome}". Maximo: ${max}.`); return; }
      }
      item.quantidade = nova;
      if (item.quantidade <= 0) venda.splice(idx, 1);
      render();
    }
    async function finalizar() {
      if (!venda.length) return;
      const btnPg = document.querySelector('button.btn-primary[onclick="finalizar()"]');
      // Revalida estoque com o banco antes de gravar
      const ids = venda.map(i => i.produto_id);
      const { data: prods, error: errP } = await sb.from("produtos").select("id,estoque,nome,ativo").in("id", ids);
      if (errP) { alert(errP.message); return; }
      for (const i of venda) {
        const p = prods.find(x => x.id === i.produto_id);
        if (!p || !p.ativo) { alert(`Produto "${i.nome}" nao esta mais ativo.`); return; }
        if (p.estoque < i.quantidade) { alert(`Estoque insuficiente para "${p.nome}". Disponivel: ${p.estoque}.`); return; }
      }
      const total = venda.reduce((s, i) => s + i.preco * i.quantidade, 0);
      if (btnPg) { btnPg.disabled = true; btnPg.textContent = "Finalizando..."; }
      const { error } = await sb.from("vendas_pdv").insert({
        itens: venda,
        total,
        forma_pagamento: document.getElementById("pg").value,
        admin_id: user.id,
      });
      if (error) { alert(error.message); if (btnPg) { btnPg.disabled = false; btnPg.textContent = "Finalizar venda"; } return; }
      const { error: rpcErr } = await sb.rpc("baixar_estoque_pdv", { p_itens: venda });
      if (rpcErr) alert("Estoque: " + rpcErr.message);
      venda = [];
      await carregar();
      if (btnPg) { btnPg.disabled = false; btnPg.textContent = "Finalizar venda"; }
      alert("Venda registrada e estoque atualizado.");
    }
    document.getElementById("busca").addEventListener("input", render);
  </script>
  <script src="/js/footer.js"></script>
</body>
</html>
