<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Relatorios - Admin</title>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-NT81HK0ZXQ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-NT81HK0ZXQ');
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { marca: { preto: "#0a0a0a", branco: "#ffffff", cinza: "#1a1a1a", claro: "#f5f5f5" } } } } };
  </script>
  <style type="text/tailwindcss">
    @layer components {
      .btn-primary { @apply bg-marca-preto text-marca-branco px-4 py-2 rounded-lg font-medium hover:bg-marca-cinza transition disabled:opacity-50; }
      .btn-outline { @apply border border-marca-preto text-marca-preto px-4 py-2 rounded-lg font-medium hover:bg-marca-preto hover:text-marca-branco transition; }
      .input { @apply w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-marca-preto; }
      .card { @apply bg-marca-branco border border-gray-200 rounded-xl shadow-sm; }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-marca-claro min-h-screen">
  <div id="nav"></div>
  <main class="max-w-6xl mx-auto px-4 py-6">
    <h2 class="text-2xl font-bold mb-4">Relatorios de venda</h2>
    <div class="card p-4 mb-4 grid md:grid-cols-4 gap-2">
      <input class="input" type="date" id="de" />
      <input class="input" type="date" id="ate" />
      <select class="input" id="origem">
        <option value="todos">Online + PDV</option>
        <option value="online">Somente Online</option>
        <option value="pdv">Somente PDV</option>
      </select>
      <button class="btn-primary" onclick="gerar()">Gerar</button>
    </div>
    <div id="resumo" class="grid md:grid-cols-3 gap-3 mb-4"></div>
    <div id="detalhe" class="space-y-4"></div>
  </main>

  <script src="/js/config.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    Auth.requireLogin().then(u => { if (u) gerar(); });
    fetch("/admin/_nav.html").then(r => r.text()).then(h => document.getElementById("nav").innerHTML = h);

    const hoje = new Date();
    const ha30 = new Date(); ha30.setDate(hoje.getDate() - 30);
    document.getElementById("de").value = ha30.toISOString().slice(0,10);
    document.getElementById("ate").value = hoje.toISOString().slice(0,10);

    async function gerar() {
      const de = document.getElementById("de").value;
      const ateStr = document.getElementById("ate").value + "T23:59:59";
      const origem = document.getElementById("origem").value;

      let online = [], pdv = [];

      if (origem === "todos" || origem === "online") {
        const { data } = await sb.from("pedidos")
          .select("*").eq("status", "entregue")
          .gte("entregue_em", de).lte("entregue_em", ateStr);
        online = data || [];
      }
      if (origem === "todos" || origem === "pdv") {
        const { data } = await sb.from("vendas_pdv")
          .select("*").gte("criado_em", de).lte("criado_em", ateStr);
        pdv = data || [];
      }

      const tOn = online.reduce((s, v) => s + Number(v.total), 0);
      const tPdv = pdv.reduce((s, v) => s + Number(v.total), 0);

      document.getElementById("resumo").innerHTML = `
        <div class="card p-4"><p class="text-sm text-gray-500">Online</p><p class="text-xl font-bold">${fmtBRL(tOn)}</p><p class="text-xs">${online.length} vendas</p></div>
        <div class="card p-4"><p class="text-sm text-gray-500">PDV</p><p class="text-xl font-bold">${fmtBRL(tPdv)}</p><p class="text-xs">${pdv.length} vendas</p></div>
        <div class="card p-4 bg-marca-preto text-marca-branco"><p class="text-sm">Total geral</p><p class="text-xl font-bold">${fmtBRL(tOn + tPdv)}</p><p class="text-xs">${online.length + pdv.length} vendas</p></div>
      `;
      document.getElementById("detalhe").innerHTML = `
        <details class="card p-3" ${origem !== "pdv" ? "open" : ""}>
          <summary class="font-bold cursor-pointer">Vendas online (${online.length})</summary>
          ${online.map(v => linha(v, v.entregue_em || v.criado_em, v.cliente_nome)).join("") || '<p class="text-sm text-gray-500 mt-2">Nenhum.</p>'}
        </details>
        <details class="card p-3" ${origem !== "online" ? "open" : ""}>
          <summary class="font-bold cursor-pointer">Vendas PDV (${pdv.length})</summary>
          ${pdv.map(v => linha(v, v.criado_em, "Balcao")).join("") || '<p class="text-sm text-gray-500 mt-2">Nenhum.</p>'}
        </details>
      `;
    }
    function linha(v, data, ref) {
      const id = "it-" + v.id;
      const itens = Array.isArray(v.itens) ? v.itens : [];
      return `<div class="border-t py-2 text-sm">
        <div class="flex justify-between items-center gap-2 flex-wrap">
          <span class="flex-1">${new Date(data).toLocaleString("pt-BR")} - ${esc(ref)} - ${esc(v.forma_pagamento)}</span>
          <span class="font-bold">${fmtBRL(v.total)}</span>
          <button class="btn-outline text-xs px-2 py-1" onclick="toggleItens('${esc(id)}', this)">+ ver itens</button>
        </div>
        <ul id="${esc(id)}" class="hidden ml-4 mt-2 list-disc list-inside text-xs text-gray-700 bg-gray-50 rounded p-2">
          ${itens.length
            ? itens.map(i => `<li>${Number(i.quantidade)}x ${esc(i.nome)} - ${fmtBRL(i.preco * i.quantidade)}</li>`).join("")
            : "<li>Sem detalhe de itens</li>"}
        </ul>
      </div>`;
    }
    function toggleItens(id, btn) {
      const el = document.getElementById(id);
      const aberto = el.classList.toggle("hidden") === false;
      btn.textContent = aberto ? "- ocultar" : "+ ver itens";
    }
  </script>
  <script src="/js/footer.js"></script>
</body>
</html>
