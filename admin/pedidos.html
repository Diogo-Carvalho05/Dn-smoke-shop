<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pedidos - Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { marca: { preto: "#0a0a0a", branco: "#ffffff", cinza: "#1a1a1a", claro: "#f5f5f5" } } } } };
  </script>
  <style type="text/tailwindcss">
    @layer components {
      .btn-primary { @apply bg-marca-preto text-marca-branco px-4 py-2 rounded-lg font-medium hover:bg-marca-cinza transition disabled:opacity-50; }
      .btn-outline { @apply border border-marca-preto text-marca-preto px-4 py-2 rounded-lg font-medium hover:bg-marca-preto hover:text-marca-branco transition; }
      .card { @apply bg-marca-branco border border-gray-200 rounded-xl shadow-sm; }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-marca-claro min-h-screen">
  <div id="nav"></div>
  <main class="max-w-6xl mx-auto px-4 py-6">
    <h2 class="text-2xl font-bold mb-4">Pedidos online</h2>
    <div class="flex gap-2 mb-4 flex-wrap">
      <button class="btn-outline" onclick="filtrar('')">Todos</button>
      <button class="btn-outline" onclick="filtrar('pendente')">Pendentes</button>
      <button class="btn-outline" onclick="filtrar('confirmado')">Confirmados</button>
      <button class="btn-outline" onclick="filtrar('saiu_entrega')">Saiu p/ entrega</button>
      <button class="btn-outline" onclick="filtrar('entregue')">Entregues</button>
      <button class="btn-outline" onclick="filtrar('cancelado')">Cancelados</button>
    </div>
    <div id="lista" class="space-y-3"></div>
  </main>

  <script src="/js/config.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    Auth.requireLogin().then(u => { if (u) filtrar(""); });
    fetch("/admin/_nav.html").then(r => r.text()).then(h => document.getElementById("nav").innerHTML = h);

    let filtroAtual = "";
    async function filtrar(s) {
      filtroAtual = s;
      let q = sb.from("pedidos").select("*").order("criado_em", { ascending: false });
      if (s) q = q.eq("status", s);
      const { data, error } = await q;
      if (error) { alert(error.message); return; }
      document.getElementById("lista").innerHTML = data.map(p => `
        <div class="card p-4">
          <div class="flex justify-between flex-wrap gap-2">
            <div>
              <p class="font-bold">${p.cliente_nome} <span class="text-gray-500 text-sm">(${p.cliente_telefone})</span></p>
              <p class="text-xs text-gray-500">${new Date(p.criado_em).toLocaleString("pt-BR")} - #${p.id.slice(0,8)}</p>
            </div>
            <span class="px-2 py-1 rounded text-xs font-bold ${badge(p.status)}">${labelStatus(p.status)}</span>
          </div>
          <p class="text-sm mt-2">
            ${p.endereco.rua}, ${p.endereco.numero}${p.endereco.complemento ? " - " + p.endereco.complemento : ""}
            ${p.endereco.bairro ? " - " + p.endereco.bairro : ""} - ${p.endereco.cidade}
            ${p.endereco.cep ? " - CEP " + p.endereco.cep : ""}
          </p>
          <ul class="text-sm mt-2 list-disc list-inside">
            ${p.itens.map(i => `<li>${i.quantidade}x ${i.nome} - ${fmtBRL(i.preco * i.quantidade)}</li>`).join("")}
          </ul>
          <p class="mt-2 font-bold">Total: ${fmtBRL(p.total)} - ${p.forma_pagamento}${p.troco_para ? " (troco p/ " + fmtBRL(p.troco_para) + ")" : ""}</p>
          ${p.status === "cancelado" && p.motivo_cancelamento
              ? `<p class="mt-2 text-sm text-red-700"><strong>Motivo do cancelamento:</strong> ${p.motivo_cancelamento}</p>`
              : ""}
          <div class="flex gap-2 mt-3 flex-wrap">
            ${p.status === "pendente"     ? `<button class="btn-primary" onclick='mudar(${JSON.stringify(p)}, "confirmado")'>Confirmar</button>` : ""}
            ${p.status === "confirmado"   ? `<button class="btn-primary" onclick='mudar(${JSON.stringify(p)}, "saiu_entrega")'>Saiu p/ entrega</button>` : ""}
            ${p.status === "saiu_entrega" ? `<button class="btn-primary" onclick='mudar(${JSON.stringify(p)}, "entregue")'>Marcar entregue (baixa estoque)</button>` : ""}
            ${["pendente","confirmado","saiu_entrega"].includes(p.status)
              ? `<button class="btn-outline" onclick='cancelar(${JSON.stringify(p)})'>Cancelar</button>` : ""}
          </div>
        </div>
      `).join("") || '<p class="text-gray-500 text-center py-8">Nenhum pedido.</p>';
    }
    function badge(s) {
      return ({
        pendente: "bg-yellow-200 text-yellow-900",
        confirmado: "bg-blue-200 text-blue-900",
        saiu_entrega: "bg-purple-200 text-purple-900",
        entregue: "bg-green-200 text-green-900",
        cancelado: "bg-red-200 text-red-900",
      })[s] || "bg-gray-200";
    }
    function labelStatus(s) {
      return ({ saiu_entrega: "SAIU P/ ENTREGA" })[s] || s.toUpperCase();
    }

    // Mensagens prontas pra avisar o cliente em cada mudanca de status
    function mensagemCliente(pedido, status, motivo) {
      const id = pedido.id.slice(0, 8);
      const nome = pedido.cliente_nome.split(" ")[0];
      const loja = LOJA.nome;
      const mapa = {
        confirmado:   `Ola ${nome}! Seu pedido #${id} na ${loja} foi *confirmado* e ja esta sendo preparado.`,
        saiu_entrega: `Ola ${nome}! Seu pedido #${id} *saiu para entrega*. Em breve nosso entregador chega ai.`,
        entregue:     `Ola ${nome}! Seu pedido #${id} foi *entregue*. Obrigado pela compra!`,
        cancelado:    `Ola ${nome}, infelizmente seu pedido #${id} foi *cancelado*.\nMotivo: ${motivo || "nao informado"}.\nQualquer duvida estamos a disposicao.`,
      };
      return mapa[status] || `Atualizacao do pedido #${id}: ${status}`;
    }

    function abrirWhatsAppCliente(telefone, mensagem) {
      // Limpa tudo que nao for digito; se nao comecar com 55 (Brasil), prefixa
      let num = String(telefone || "").replace(/\D/g, "");
      if (num.length >= 10 && !num.startsWith("55")) num = "55" + num;
      if (!num) { alert("Telefone do cliente invalido."); return; }
      window.open(`https://wa.me/${num}?text=${encodeURIComponent(mensagem)}`, "_blank");
    }

    async function mudar(pedido, status) {
      if (!confirm("Mudar pedido para: " + status.replace("_"," ") + "?")) return;
      const update = { status };
      if (status === "confirmado")   update.confirmado_em   = new Date().toISOString();
      if (status === "saiu_entrega") update.saiu_entrega_em = new Date().toISOString();
      if (status === "entregue")     update.entregue_em     = new Date().toISOString();
      const { error } = await sb.from("pedidos").update(update).eq("id", pedido.id);
      if (error) { alert(error.message); return; }
      if (status === "entregue") {
        const { error: rpcErr } = await sb.rpc("baixar_estoque_pedido", { p_pedido_id: pedido.id });
        if (rpcErr) alert("Estoque: " + rpcErr.message);
      }
      // Abre WhatsApp do cliente com mensagem ja pronta
      abrirWhatsAppCliente(pedido.cliente_telefone, mensagemCliente(pedido, status));
      filtrar(filtroAtual);
    }

    async function cancelar(pedido) {
      const motivo = prompt("Justificativa do cancelamento (sera enviada ao cliente):");
      if (!motivo || !motivo.trim()) { alert("Motivo obrigatorio."); return; }
      const { error } = await sb.from("pedidos").update({
        status: "cancelado",
        motivo_cancelamento: motivo.trim(),
      }).eq("id", pedido.id);
      if (error) { alert(error.message); return; }
      abrirWhatsAppCliente(pedido.cliente_telefone, mensagemCliente(pedido, "cancelado", motivo.trim()));
      filtrar(filtroAtual);
    }
  </script>
  <script src="/js/footer.js"></script>
</body>
</html>
