<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dn Smoke Shop</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { marca: { preto: "#0a0a0a", branco: "#ffffff", cinza: "#1a1a1a", claro: "#f5f5f5" } } } } };
  </script>
  <style type="text/tailwindcss">
    @layer components {
      .btn-primary { @apply bg-marca-preto text-marca-branco px-4 py-2 rounded-lg font-medium hover:bg-marca-cinza transition disabled:opacity-50; }
      .btn-outline { @apply border border-marca-preto text-marca-preto px-4 py-2 rounded-lg font-medium hover:bg-marca-preto hover:text-marca-branco transition; }
      .input { @apply w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-marca-preto; }
      .card { @apply bg-marca-branco border border-gray-200 rounded-xl shadow-sm; }
    }
  </style>
</head>
<body class="bg-marca-claro text-marca-preto min-h-screen">
  <header class="bg-marca-preto text-marca-branco">
    <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
      <h1 class="text-xl font-bold tracking-wide">DN SMOKE SHOP</h1>
      <a href="/carrinho.html" class="relative">
        Carrinho <span id="badge-carrinho" class="ml-1 bg-marca-branco text-marca-preto rounded-full px-2 text-xs font-bold">0</span>
      </a>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-6">
    <h2 class="text-2xl font-semibold mb-4">Produtos</h2>
    <div id="lista" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"></div>
    <p id="vazio" class="hidden text-center text-gray-500 py-12">Nenhum produto disponivel.</p>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/carrinho.js"></script>
  <script>
    async function carregar() {
      const lista = document.getElementById("lista");
      const produtos = await API.get("/api/produtos?ativos=1");
      if (!produtos.length) { document.getElementById("vazio").classList.remove("hidden"); return; }
      lista.innerHTML = produtos.map(p => `
        <div class="card p-3 flex flex-col">
          <div class="aspect-square bg-gray-100 rounded-lg mb-2 overflow-hidden flex items-center justify-center">
            ${p.imagem_url ? `<img src="${p.imagem_url}" class="w-full h-full object-cover" alt="${p.nome}">` : '<span class="text-gray-400 text-xs">sem foto</span>'}
          </div>
          <h3 class="font-semibold text-sm">${p.nome}</h3>
          <p class="text-xs text-gray-500 flex-1">${p.descricao || ""}</p>
          <p class="font-bold mt-2">${fmtBRL(Number(p.preco))}</p>
          <p class="text-xs text-gray-500 mb-2">Estoque: ${p.estoque}</p>
          <button class="btn-primary text-sm" onclick='adicionar(${JSON.stringify(p)})' ${p.estoque <= 0 ? "disabled" : ""}>
            ${p.estoque <= 0 ? "Sem estoque" : "Adicionar"}
          </button>
        </div>
      `).join("");
    }
    function adicionar(p) {
      Carrinho.add(p, 1);
      atualizarBadge();
    }
    function atualizarBadge() {
      document.getElementById("badge-carrinho").textContent = Carrinho.qtdTotal();
    }
    atualizarBadge();
    carregar().catch(e => alert("Erro ao carregar produtos: " + e.message));
  </script>
</body>
</html>
