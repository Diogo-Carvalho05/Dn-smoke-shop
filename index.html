<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dn Smoke Shop</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { marca: { preto: "#0a0a0a", branco: "#ffffff", cinza: "#1a1a1a", claro: "#f5f5f5" } } } } };
  </script>
  <style type="text/tailwindcss">
    @layer components {
      .btn-primary { @apply bg-marca-preto text-marca-branco px-4 py-2 rounded-lg font-medium hover:bg-marca-cinza transition disabled:opacity-50; }
      .btn-outline { @apply border border-marca-preto text-marca-preto px-4 py-2 rounded-lg font-medium hover:bg-marca-preto hover:text-marca-branco transition; }
      .input { @apply w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-marca-preto; }
      .card { @apply bg-marca-branco border border-gray-200 rounded-xl shadow-sm; }
    }
  </style>
  <style>
    /* animacao do ponto voando para o carrinho */
    #fly-dot { position:fixed; pointer-events:none; z-index:9999; border-radius:50%; background:#0a0a0a; width:18px; height:18px; transition: left .55s cubic-bezier(.3,.8,.3,1), top .55s cubic-bezier(.3,.8,.3,1), opacity .55s, transform .55s; }
    html.dark #fly-dot { background:#ffffff; }
    #badge-carrinho { transition: transform .25s; display:inline-flex; align-items:center; justify-content:center; min-width:20px; height:20px; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-marca-claro text-marca-preto min-h-screen">
  <header class="bg-marca-preto text-marca-branco">
    <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
      <a href="/"><img src="/assets/logo.png" alt="Dn Smoke Shop" class="h-20 w-auto object-contain" style="filter:brightness(0) invert(1)"></a>
      <!-- Carrinho com icone SVG -->
      <a href="/carrinho.html" class="flex items-center gap-1.5 hover:opacity-80 transition-opacity">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg>
        <span id="badge-carrinho" class="bg-white text-[#0a0a0a] rounded-full px-1.5 text-[10px] font-black leading-none">0</span>
      </a>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-6">
    <h2 class="text-2xl font-semibold mb-4">Produtos</h2>

    <!-- Busca -->
    <div class="mb-4">
      <input
        type="text"
        id="busca"
        placeholder="Buscar por nome ou marca..."
        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-marca-preto"
      />
    </div>

    <!-- Abas de marcas -->
    <div id="abas-marca" class="flex gap-2 mb-4 flex-wrap overflow-x-auto pb-2"></div>

    <!-- Lista de produtos (grid quando filtrado; blocos por marca quando "Todas") -->
    <div id="lista"></div>
    <p id="vazio" class="hidden text-center text-gray-500 py-12">Nenhum produto disponivel.</p>
  </main>

  <script src="/js/config.js"></script>
  <script src="/js/idade.js"></script>
  <script src="/js/carrinho.js"></script>
  <script>
    let taxaAtiva = false;
    let todosProdutos = [];
    let todasMarcas = [];
    let marcaSelecionada = null;
    let termoBusca = "";

    async function carregar() {
      // Busca produtos sem join (compativel mesmo antes de rodar o SQL de marcas)
      const [prodRes, marcaRes, cfgRes] = await Promise.all([
        sb.from("produtos").select("*").eq("ativo", true).order("nome"),
        sb.from("marcas").select("*").eq("ativo", true).order("nome"),
        sb.from("config_loja").select("taxa_entrega_ativa").eq("id", 1).single(),
      ]);
      if (prodRes.error) { alert("Erro ao carregar produtos: " + prodRes.error.message); return; }
      taxaAtiva = cfgRes.data?.taxa_entrega_ativa ?? false;
      todosProdutos = prodRes.data || [];
      todasMarcas = marcaRes.error ? [] : (marcaRes.data || []);

      // Injeta nome da marca em cada produto para exibir no card
      const marcaMap = Object.fromEntries(todasMarcas.map(m => [m.id, m.nome]));
      todosProdutos = todosProdutos.map(p => ({
        ...p,
        marcas: p.marca_id ? { id: p.marca_id, nome: marcaMap[p.marca_id] || "" } : null,
      }));

      renderAbas();

      if (!todosProdutos.length) { document.getElementById("vazio").classList.remove("hidden"); return; }

      render();
    }

    const GRID = "grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4";

    function cardProduto(p, mostrarMarca = false) {
      const promo       = p.preco_promocao !== null && p.preco_promocao < p.preco;
      const freteGratis = taxaAtiva && p.isenta_taxa_entrega;
      const precoFinal  = promo ? p.preco_promocao : p.preco;
      const ringCor     = promo ? "ring-red-500" : freteGratis ? "ring-green-500" : "";
      return `
      <div class="card p-3 flex flex-col relative ${ringCor ? "ring-2 " + ringCor : ""}">
        <div class="absolute top-2 left-2 flex flex-col gap-1 z-10">
          ${promo       ? `<span class="bg-red-500 text-white text-[10px] font-bold px-2 py-0.5 rounded-full">PROMO</span>` : ""}
          ${freteGratis ? `<span class="bg-green-600 text-white text-[10px] font-bold px-2 py-0.5 rounded-full">FRETE GRATIS</span>` : ""}
        </div>
        <div class="aspect-square bg-gray-100 rounded-lg mb-2 overflow-hidden flex items-center justify-center">
          ${p.imagem_url
            ? `<img src="${esc(p.imagem_url)}" loading="lazy" decoding="async"
                     class="w-full h-full object-cover bg-gray-200"
                     alt="${esc(p.nome)}"
                     onerror="this.replaceWith(Object.assign(document.createElement('span'),{className:'text-gray-400 text-xs',textContent:'sem foto'}))">`
            : '<span class="text-gray-400 text-xs">sem foto</span>'}
        </div>
        <h3 class="font-semibold text-sm">${esc(p.nome)}</h3>
        ${mostrarMarca && p.marcas ? `<p class="text-xs text-gray-500">${esc(p.marcas.nome)}</p>` : ""}
        <p class="text-xs text-gray-500 flex-1">${esc(p.descricao || "")}</p>
        <div class="mt-2">
          ${promo
            ? `<p class="font-bold text-red-600">${fmtBRL(precoFinal)}</p>
               <p class="text-xs text-gray-400 line-through">${fmtBRL(p.preco)}</p>`
            : `<p class="font-bold">${fmtBRL(p.preco)}</p>`}
        </div>
        <p class="text-xs text-gray-500 mb-2">Estoque: ${Number(p.estoque)}</p>
        <button class="btn-primary text-sm" onclick='adicionar(${escAttr(p)}, this)' ${p.estoque <= 0 ? "disabled" : ""}>
          ${p.estoque <= 0 ? "Sem estoque" : "Adicionar"}
        </button>
      </div>`;
    }

    function ordenarProdutos(lista) {
      const temDestaque = p =>
        (p.preco_promocao !== null && p.preco_promocao < p.preco) ||
        (taxaAtiva && p.isenta_taxa_entrega);
      return [
        ...lista.filter(p => temDestaque(p)),
        ...lista.filter(p => !temDestaque(p)),
      ];
    }

    function render() {
      const busca = termoBusca.toLowerCase();

      // Filtra por busca e marca
      let filtrados = todosProdutos.filter(p => {
        const encaixaMarca = marcaSelecionada === null || p.marca_id === marcaSelecionada;
        const encaixaBusca = busca === "" ||
          p.nome.toLowerCase().includes(busca) ||
          (p.marcas?.nome || "").toLowerCase().includes(busca);
        return encaixaMarca && encaixaBusca;
      });

      const lista = document.getElementById("lista");

      if (!filtrados.length) {
        document.getElementById("vazio").classList.remove("hidden");
        lista.innerHTML = "";
        return;
      }
      document.getElementById("vazio").classList.add("hidden");

      // Modo blocos: sem filtro de marca E sem busca ativa
      if (marcaSelecionada === null && busca === "") {
        // Agrupa por marca (preserva a ordem das abas)
        const grupos = new Map(); // marca_id => { nome, produtos }
        for (const p of filtrados) {
          const chave = p.marca_id || "__sem_marca__";
          if (!grupos.has(chave)) {
            grupos.set(chave, {
              nome: p.marcas?.nome || "Outros",
              produtos: [],
            });
          }
          grupos.get(chave).produtos.push(p);
        }
        // Marcas com nome primeiro, "Outros" por ultimo
        const entries = [...grupos.entries()].sort(([ka], [kb]) => {
          if (ka === "__sem_marca__") return 1;
          if (kb === "__sem_marca__") return -1;
          return grupos.get(ka).nome.localeCompare(grupos.get(kb).nome);
        });

        lista.innerHTML = entries.map(([, g]) => `
          <section class="mb-8">
            <h2 class="text-xl font-bold mb-3 pb-2 border-b border-gray-200">${esc(g.nome)}</h2>
            <div class="${GRID}">
              ${ordenarProdutos(g.produtos).map(p => cardProduto(p, false)).join("")}
            </div>
          </section>
        `).join("");

      } else {
        // Modo flat: marca filtrada ou busca ativa — grade simples, mostra nome da marca
        lista.innerHTML = `
          <div class="${GRID}">
            ${ordenarProdutos(filtrados).map(p => cardProduto(p, true)).join("")}
          </div>`;
      }
    }
    function renderAbas() {
      const abasMarcas = [{ id: null, nome: "Todas" }, ...todasMarcas];
      document.getElementById("abas-marca").innerHTML = abasMarcas.map(m => `
        <button
          class="px-4 py-2 rounded-lg border transition whitespace-nowrap ${
            marcaSelecionada === m.id
              ? "bg-marca-preto text-marca-branco border-marca-preto"
              : "border-gray-300 hover:border-marca-preto"
          }"
          onclick="filtrarPorMarca('${m.id || 'null'}')"
        >${esc(m.nome)}</button>
      `).join("");
    }

    function filtrarPorMarca(marcaId) {
      marcaSelecionada = marcaId === 'null' ? null : marcaId;
      renderAbas();
      render();
    }

    document.getElementById("busca").addEventListener("input", e => {
      termoBusca = e.target.value;
      render();
    });

    function adicionar(p, btn) {
      // Usa preco promocional se disponivel
      const temPromo = p.preco_promocao !== null && p.preco_promocao < p.preco;
      const prodCarrinho = { ...p, preco: temPromo ? p.preco_promocao : p.preco };
      if (!Carrinho.add(prodCarrinho, 1)) return;
      atualizarBadge();
      flyToCart(btn);
    }
    function atualizarBadge() { document.getElementById("badge-carrinho").textContent = Carrinho.qtdTotal(); }

    function flyToCart(srcEl) {
      const badge = document.getElementById("badge-carrinho");
      if (!badge || !srcEl) return;
      const from = srcEl.closest(".card").getBoundingClientRect();
      const to   = badge.getBoundingClientRect();

      const dot = document.createElement("div");
      dot.id = "fly-dot";
      dot.style.left    = `${from.left + from.width  / 2 - 9}px`;
      dot.style.top     = `${from.top  + from.height / 2 - 9}px`;
      dot.style.opacity = "1";
      dot.style.transform = "scale(1)";
      document.body.appendChild(dot);

      requestAnimationFrame(() => requestAnimationFrame(() => {
        dot.style.left      = `${to.left + to.width  / 2 - 9}px`;
        dot.style.top       = `${to.top  + to.height / 2 - 9}px`;
        dot.style.transform = "scale(0.1)";
        dot.style.opacity   = "0";
      }));

      setTimeout(() => {
        dot.remove();
        badge.style.transform = "scale(1.7)";
        setTimeout(() => badge.style.transform = "scale(1)", 250);
      }, 580);
    }

    atualizarBadge();
    carregar();
  </script>
  <script src="/js/footer.js"></script>
</body>
</html>
