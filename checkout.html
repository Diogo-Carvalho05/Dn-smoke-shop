<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Checkout - Dn Smoke Shop</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { marca: { preto: "#0a0a0a", branco: "#ffffff", cinza: "#1a1a1a", claro: "#f5f5f5" } } } } };
  </script>
  <style type="text/tailwindcss">
    @layer components {
      .btn-primary { @apply bg-marca-preto text-marca-branco px-4 py-2 rounded-lg font-medium hover:bg-marca-cinza transition disabled:opacity-50; }
      .btn-outline { @apply border border-marca-preto text-marca-preto px-4 py-2 rounded-lg font-medium hover:bg-marca-preto hover:text-marca-branco transition; }
      .input { @apply w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-marca-preto; }
      .card { @apply bg-marca-branco border border-gray-200 rounded-xl shadow-sm; }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-marca-claro text-marca-preto min-h-screen">
  <header class="bg-marca-preto text-marca-branco">
    <div class="max-w-2xl mx-auto px-4 py-4 flex items-center">
      <a href="/"><img src="/assets/logo.png" alt="Dn Smoke Shop" class="h-20 w-auto object-contain" style="filter:brightness(0) invert(1)"></a>
    </div>
  </header>

  <main class="max-w-2xl mx-auto px-4 py-6">
    <h2 class="text-2xl font-semibold mb-4">Finalizar pedido</h2>
    <form id="form" class="space-y-4">
      <div class="card p-4 space-y-3">
        <h3 class="font-semibold">Seus dados</h3>
        <input class="input" name="nome" placeholder="Nome completo" required />
        <input class="input" name="telefone" placeholder="Telefone / WhatsApp" required />
      </div>

      <div class="card p-4 space-y-3">
        <h3 class="font-semibold">Endereco de entrega</h3>
        <div class="flex gap-2">
          <input class="input" name="cep" placeholder="CEP (opcional)" maxlength="9" />
          <button type="button" class="btn-outline whitespace-nowrap" onclick="buscarCep()">Buscar</button>
        </div>
        <input class="input" name="rua" placeholder="Rua *" required />
        <div class="grid grid-cols-2 gap-2">
          <input class="input" name="numero" placeholder="Numero *" required />
          <input class="input" name="complemento" placeholder="Complemento" />
        </div>
        <input class="input" name="bairro" placeholder="Bairro" />
        <input class="input" name="cidade" placeholder="Cidade *" required />
      </div>

      <div class="card p-4 space-y-3">
        <h3 class="font-semibold">Pagamento</h3>
        <select class="input" name="forma_pagamento" id="pg" required>
          <option value="">Selecione...</option>
          <option value="cartao">Cartao (na entrega)</option>
          <option value="pix">PIX</option>
          <option value="dinheiro">Dinheiro</option>
        </select>
        <div id="box-troco" class="hidden">
          <label class="text-sm text-gray-600">Precisa de troco para quanto?</label>
          <input class="input mt-1" name="troco_para" type="number" step="0.01" placeholder="Deixe em branco se nao precisar" />
        </div>
      </div>

      <div class="card p-4">
        <div class="flex justify-between font-bold text-lg">
          <span>Total</span><span id="total"></span>
        </div>
        <button id="btn-confirmar" class="btn-primary w-full mt-4" type="submit">Confirmar pedido</button>
      </div>
    </form>

    <!-- Tela de sucesso (escondida ate o pedido ser criado) -->
    <div id="sucesso" class="hidden card p-6 text-center space-y-4">
      <div class="text-5xl">&#10004;</div>
      <h3 class="text-xl font-bold">Pedido criado!</h3>
      <p class="text-sm text-gray-600">
        Toque nos botoes abaixo pra avisar a loja pelo WhatsApp.<br>
        <strong>Importante:</strong> envie pelos dois numeros pra garantir que o pedido seja recebido.
      </p>
      <div id="botoes-wa" class="flex flex-col gap-2"></div>
      <a href="/" class="btn-outline block text-center">Voltar pra loja</a>
    </div>
  </main>

  <script src="/js/config.js"></script>
  <script src="/js/idade.js"></script>
  <script src="/js/carrinho.js"></script>
  <script>
    if (!Carrinho.itens().length) location.href = "/";
    document.getElementById("total").textContent = fmtBRL(Carrinho.total());

    document.getElementById("pg").addEventListener("change", e => {
      document.getElementById("box-troco").classList.toggle("hidden", e.target.value !== "dinheiro");
    });

    async function buscarCep() {
      const cep = document.querySelector('[name=cep]').value.replace(/\D/g, "");
      if (cep.length !== 8) { alert("CEP invalido"); return; }
      const r = await fetch(`https://viacep.com.br/ws/${cep}/json/`).then(r => r.json());
      if (r.erro) { alert("CEP nao encontrado"); return; }
      document.querySelector('[name=rua]').value = r.logradouro || "";
      document.querySelector('[name=bairro]').value = r.bairro || "";
      document.querySelector('[name=cidade]').value = r.localidade || "";
    }

    document.getElementById("form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("btn-confirmar");
      btn.disabled = true; btn.textContent = "Enviando...";

      try {
        const f = new FormData(e.target);
        const itens = Carrinho.itens();
        const total = Carrinho.total();

        // Revalida estoque antes de gravar (anti race-condition)
        const ids = itens.map(i => i.produto_id);
        const { data: prods, error: errProd } = await sb.from("produtos").select("id,estoque,nome,ativo").in("id", ids);
        if (errProd) throw errProd;
        for (const i of itens) {
          const p = prods.find(x => x.id === i.produto_id);
          if (!p || !p.ativo) throw new Error(`Produto "${i.nome}" nao esta mais disponivel.`);
          if (p.estoque < i.quantidade) throw new Error(`Estoque insuficiente para "${p.nome}". Disponivel: ${p.estoque}.`);
        }

        const pedidoId = crypto.randomUUID();
        const pedido = {
          id: pedidoId,
          cliente_nome: f.get("nome"),
          cliente_telefone: f.get("telefone"),
          endereco: {
            cep: f.get("cep") || null,
            rua: f.get("rua"),
            numero: f.get("numero"),
            complemento: f.get("complemento") || null,
            bairro: f.get("bairro") || null,
            cidade: f.get("cidade"),
          },
          itens,
          total,
          forma_pagamento: f.get("forma_pagamento"),
          troco_para: f.get("forma_pagamento") === "dinheiro" && f.get("troco_para") ? Number(f.get("troco_para")) : null,
        };

        const { error } = await sb.from("pedidos").insert(pedido);
        if (error) throw error;

        const linhas = [
          `*Novo pedido - ${LOJA.nome}*`,
          `Cliente: ${pedido.cliente_nome}`,
          `Telefone: ${pedido.cliente_telefone}`,
          `Endereco: ${pedido.endereco.rua}, ${pedido.endereco.numero}${pedido.endereco.complemento ? " - " + pedido.endereco.complemento : ""} - ${pedido.endereco.bairro || ""} - ${pedido.endereco.cidade}`,
          ``,
          `*Itens:*`,
          ...itens.map(i => `- ${i.quantidade}x ${i.nome} (${fmtBRL(i.preco * i.quantidade)})`),
          ``,
          `Total: ${fmtBRL(total)}`,
          `Pagamento: ${pedido.forma_pagamento}${pedido.troco_para ? " (troco para " + fmtBRL(pedido.troco_para) + ")" : ""}`,
          ``,
          `Pedido #${pedidoId.slice(0,8)}`,
        ].join("\n");
        Carrinho.limpar();

        // Mostra tela de sucesso com botoes para os 2 numeros
        const texto = encodeURIComponent(linhas);
        const numeros = [
          { num: LOJA.whatsapp, label: "1. Avisar Admin" },
          ...(LOJA.whatsapp_secundario ? [{ num: LOJA.whatsapp_secundario, label: "2. Avisar Admin" }] : []),
        ];
        document.getElementById("botoes-wa").innerHTML = numeros.map(n => `
          <a href="https://wa.me/${n.num}?text=${texto}" target="_blank" rel="noopener"
             class="btn-primary block text-center">${n.label}</a>
        `).join("");
        document.getElementById("form").classList.add("hidden");
        document.getElementById("sucesso").classList.remove("hidden");
        window.scrollTo({ top: 0, behavior: "smooth" });
      } catch (err) {
        alert("Erro ao enviar pedido: " + (err.message || err));
        btn.disabled = false; btn.textContent = "Confirmar pedido";
      }
    });
  </script>
  <script src="/js/footer.js"></script>
</body>
</html>
